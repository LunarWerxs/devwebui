name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · build · test (${{ matrix.os }})
    # The shipped artifact is a per-OS `bun --compile` binary (see scripts/build.ts /
    # release.yml), so run the full suite on all three rather than just Linux.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint + format (Biome)
        run: bun run lint

      - name: Typecheck (web + server)
        run: bun run typecheck

      - name: Build (i18n gate + vue-tsc + vite)
        run: bun run build

      - name: Test
        run: bun test

    # NOTE: the windows-latest leg exercises the daemon's Windows-only metrics path
    # (bun:ffi, instead of the pidusage fallback used on Linux/macOS) AND the tray's
    # Windows -SelfTest (tests/launcher.test.ts's `test.skipIf(!isWin)` cases run
    # automatically here, skip on ubuntu/macos) — no extra CI wiring needed, the
    # suite's own platform guards do the right thing per OS.
